<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MW-Price-Checker | Matrix Warehouse Scanner</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="logo.svg" type="image/svg+xml">
</head>
<body>
    <div class="matrix-container">
        <!-- Header -->
        <header class="matrix-header">
            <div class="header-content">
                <div class="header-logo-title">
                    <img src="logo.svg" alt="MW Logo" class="header-logo">
                    <div class="header-text">
                        <h1 class="matrix-title">
                            <span class="glitch" data-text="MW-PRICE-CHECKER">MW-PRICE-CHECKER</span>
                        </h1>
                        <p class="matrix-subtitle">MATRIX WAREHOUSE BARCODE SCANNER v1.0</p>
                    </div>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="matrix-main">
            <div class="control-panel">
                <!-- Quick Search Section -->
                <section class="control-section">
                    <h2 class="section-title">🔍 QUICK SEARCH</h2>
                    <div class="control-group">
                        <label for="quickSearch" class="control-label">BARCODE/SKU/ITEM#</label>
                        <div class="input-group">
                            <input 
                                type="text" 
                                id="quickSearch" 
                                placeholder="ENTER CODE..." 
                                class="manual-input"
                                autocomplete="off"
                            >
                            <button id="quickSearchBtn" class="btn btn-primary">SEARCH</button>
                        </div>
                    </div>
                </section>

                <!-- Backup CSV Section -->
                <section class="control-section">
                    <h2 class="section-title">📁 BACKUP CSV</h2>
                    <div class="control-group">
                        <label for="backupCsvInput" class="control-label">FINCON EXPORT FILE</label>
                        <div class="file-input-wrapper">
                            <input
                                type="file"
                                id="backupCsvInput"
                                class="file-input"
                                accept=".csv,text/csv"
                            >
                            <label for="backupCsvInput" class="file-input-label" id="backupCsvLabel">
                                SELECT CSV BACKUP FILE
                            </label>
                        </div>
                        <div class="control-hint" id="backupCsvMeta">NO CSV BACKUP LOADED</div>
                    </div>
                    <div class="button-group button-group-single">
                        <button id="clearBackupData" class="btn btn-secondary">CSV PERSISTS (UPLOAD NEW TO REPLACE)</button>
                    </div>
                </section>

                <!-- Camera Controls Section -->
                <section class="control-section">
                    <h2 class="section-title">📷 CAMERA CONTROL</h2>
                    <div class="control-group">
                        <button id="cameraToggle" class="btn btn-primary">
                            <span class="btn-icon">▶</span>
                            ACTIVATE CAMERA
                        </button>
                        <div class="camera-status" id="cameraStatus">
                            <span class="status-icon">⚫</span>
                            <span class="status-text">CAMERA INACTIVE</span>
                        </div>
                    </div>
                </section>

                <!-- Scan Settings -->
                <section class="control-section">
                    <h2 class="section-title">⚙️ SCAN SETTINGS</h2>
                    <div class="control-group">
                        <label for="soundToggle" class="checkbox-label">
                            <input type="checkbox" id="soundToggle" checked>
                            <span>ENABLE SCAN BEEP</span>
                        </label>
                    </div>
                </section>

                <!-- Data Status -->
                <section class="control-section">
                    <h2 class="section-title">📊 STATUS</h2>
                    <div class="data-status" id="dataStatus">
                        <span class="status-icon">🔗</span>
                        <span class="status-text">LIVE API READY</span>
                    </div>
                </section>

                <!-- Quick Actions -->
                <section class="control-section">
                    <h2 class="section-title">🎯 ACTIONS</h2>
                    <div class="button-group">
                        <button id="clearData" class="btn btn-secondary">CLEAR CACHE</button>
                        <button id="clearHistory" class="btn btn-secondary">CLEAR HISTORY</button>
                    </div>
                </section>
            </div>

            <!-- Camera and Display Area -->
            <div class="scanner-display">
                <!-- Video Element -->
                <div class="video-container">
                    <video id="cameraVideo" playsinline autoplay muted></video>
                    <canvas id="scanCanvas" class="scan-canvas"></canvas>
                    <div class="camera-overlay">
                        <div class="scan-frame">
                            <div class="corner corner-tl"></div>
                            <div class="corner corner-tr"></div>
                            <div class="corner corner-bl"></div>
                            <div class="corner corner-br"></div>
                            <div class="scan-line"></div>
                        </div>
                    </div>
                </div>

                <!-- Results Display -->
                <div class="results-panel">
                    <h3 class="results-title">PRODUCT DETAILS</h3>
                    <div id="resultsContainer" class="results-container">
                        <div class="no-results">
                            <span class="no-results-icon">⊙</span>
                            <p>AWAITING SCAN OR SEARCH...</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- Scan History -->
        <aside class="matrix-sidebar">
            <h2 class="sidebar-title">📝 SCAN HISTORY</h2>
            <div id="scanHistory" class="scan-history-list">
                <div class="history-empty">NO SCANS</div>
            </div>
        </aside>
    </div>

    <!-- Loading Spinner -->
    <div id="loadingSpinner" class="loading-spinner">
        <div class="spinner-box">
            <div class="spinner-inner"></div>
        </div>
        <p class="spinner-text">PROCESSING...</p>
    </div>

    <!-- Scripts - Load in correct order -->
    <script src="https://cdn.jsdelivr.net/npm/quagga@0.3.2/dist/quagga.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
