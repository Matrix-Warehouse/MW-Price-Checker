<?xml version="1.0" encoding="UTF-8"?>
<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer circle -->
  <circle cx="64" cy="64" r="60" fill="none" stroke="#ff0055" stroke-width="4"/>
  
  <!-- Inner accent circle -->
  <circle cx="64" cy="64" r="55" fill="none" stroke="#ff0055" stroke-width="1" opacity="0.3"/>
  
  <!-- Big red M -->
  <g>
    <!-- Left vertical line of M -->
    <line x1="35" y1="100" x2="35" y2="28" stroke="#ff0055" stroke-width="10" stroke-linecap="round"/>
    
    <!-- Left diagonal -->
    <line x1="35" y1="28" x2="64" y2="65" stroke="#ff0055" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Right diagonal -->
    <line x1="64" y1="65" x2="93" y2="28" stroke="#ff0055" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Right vertical line of M -->
    <line x1="93" y1="28" x2="93" y2="100" stroke="#ff0055" stroke-width="10" stroke-linecap="round"/>
  </g>
  
  <!-- Glow effect -->
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Apply glow to circle -->
  <circle cx="64" cy="64" r="60" fill="none" stroke="#ff0055" stroke-width="4" opacity="0.3" filter="url(#glow)"/>
</svg>
